# ============================================================
# .tmux.conf
# ============================================================

# -----------------------------------------------------------
# General
# -----------------------------------------------------------

# Start windows and panes at index 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows automatically when one is closed
set -g renumber-windows on

# Increase scrollback buffer size
set -g history-limit 10000

# Reduce escape-time for faster key response (useful in vim)
set -sg escape-time 10

# -----------------------------------------------------------
# Color Support
# -----------------------------------------------------------

# Try to enable 24-bit (true color) support first.
# Falls back to 256-color if the terminal doesn't support it.
if-shell '[ "$(tput colors 2>/dev/null)" = "16777216" ] || \
          [ "$COLORTERM" = "truecolor" ] || \
          [ "$COLORTERM" = "24bit" ]' \
  'set -g default-terminal "tmux-256color"; \
   set -ga terminal-overrides ",*256col*:Tc,xterm-kitty:Tc,alacritty:Tc"' \
  'if-shell "tput colors 2>/dev/null | grep -qE \"^256$\"" \
    "set -g default-terminal \"tmux-256color\"; \
     set -ga terminal-overrides \",*256col*:colors=256\"" \
    "set -g default-terminal \"screen\""'

# -----------------------------------------------------------
# Mouse Support
# -----------------------------------------------------------

# Enable mouse for pane selection, resizing, and scrolling
set -g mouse on

# -----------------------------------------------------------
# Status Bar
# -----------------------------------------------------------

# Refresh status bar every second
set -g status-interval 1
# Status bar color
set-option -g status-bg "#ffffff"

# Show window index starting from 1 in status bar
set -g status-left  "[#S] "
set -g status-right " %Y-%m-%d %H:%M:%S"

set -g status-left-length  30
set -g status-right-length 30

# Window list text black (inactive and active)
# setw -g window-status-style         "fg=black"
# setw -g window-status-current-style "fg=black,bold"

# -----------------------------------------------------------
# Key Bindings
# -----------------------------------------------------------

# Set prefix to Ctrl-a (classic screen-style) in addition to Ctrl-b
set -g prefix2 C-a
bind C-a send-prefix -2

# Reload config with prefix + r
bind r source-file ~/.tmux.conf \; display-message "Config reloaded."

# Split panes using | and - (intuitive directions)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Open new windows in the current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# -----------------------------------------------------------
# Copy Mode (vi-style)
# -----------------------------------------------------------

setw -g mode-keys vi

bind Enter copy-mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
